services:
  - type: web
    name: clarity-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm run start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: clarity-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"

databases:
  - name: clarity-db
    plan: free
